<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Вход — Пекарня</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #fdf8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 40px 36px;
    width: 100%;
    max-width: 360px;
  }
  .logo { font-size: 2rem; text-align: center; margin-bottom: 4px; }
  h1 {
    text-align: center;
    font-size: 1.2rem;
    color: #3d2b1f;
    margin-bottom: 28px;
    font-weight: 500;
  }
  label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    color: #5a3e2b;
    margin-bottom: 4px;
    margin-top: 16px;
  }
  input {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid #d9c9b8;
    border-radius: 8px;
    font-size: 1rem;
    color: #3d2b1f;
    background: #fffdf9;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #b07c4f; }
  .btn {
    display: block;
    width: 100%;
    margin-top: 28px;
    padding: 12px;
    background: #b07c4f;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn:hover { background: #8f6038; }
  .alert-error {
    padding: 10px 14px;
    border-radius: 8px;
    background: #fdecea;
    color: #8b1a1a;
    border: 1px solid #f5c6c6;
    font-size: 0.9rem;
    margin-bottom: 16px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🍞</div>
  <h1>Панель управления</h1>

  {{if .Error}}
  <div class="alert-error">{{.Error}}</div>
  {{end}}

  <form method="POST" action="/admin/login">
    <label for="login">Логин</label>
    <input type="text" id="login" name="login" autocomplete="username" required>

    <label for="password">Пароль</label>
    <input type="password" id="password" name="password" autocomplete="current-password" required>

    <button class="btn" type="submit">Войти</button>
  </form>
</div>
</body>
</html>
